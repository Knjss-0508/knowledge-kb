name: answer-hub-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root project
        run: python -m pip install -e ".[ui,dev]"

      - name: Install CZ backend
        run: python -m pip install -r cz-knowledge-kb/knowledge-kb-master/backend/requirements.txt

      - name: Root tests
        run: pytest -q

      - name: CZ backend tests
        working-directory: cz-knowledge-kb/knowledge-kb-master/backend
        run: pytest -q

      - name: Python compile
        run: python -m compileall -q src tests streamlit_app.py cz-knowledge-kb/knowledge-kb-master/backend/app

      - name: Sensitive artifact scan
        run: python scripts/scan_sensitive_files.py --root .

      - name: Frontend JavaScript syntax
        run: python scripts/extract_inline_js.py --html cz-knowledge-kb/knowledge-kb-master/frontend/index.html --output /tmp/cz-inline.js

      - run: node --check /tmp/cz-inline.js

      - name: Compose configuration
        working-directory: cz-knowledge-kb/knowledge-kb-master
        run: docker compose config --quiet
