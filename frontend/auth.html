<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 答疑中台</title>
  <style>
    :root{--app-font:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI Variable","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei UI","Microsoft YaHei",Arial,sans-serif;--ink:#1d2939;--muted:#667085;--line:#dfe5ea;--teal:#009b83;--teal-dark:#007f6b;--coral:#ef6d5b}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#f6f8f9;color:var(--ink);font-family:var(--app-font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,input,textarea,select{font-family:var(--app-font)!important}
    .shell{width:min(900px,100%);display:grid;grid-template-columns:1.05fr .95fr;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 24px 60px rgba(29,41,57,.11)}
    .intro{min-height:510px;position:relative;padding:48px;background:#172633;color:#fff;overflow:hidden}
    .intro:before,.intro:after{content:"";position:absolute;z-index:0;border:34px solid rgba(0,155,131,.68);border-radius:50%;pointer-events:none}.intro:before{width:230px;height:230px;right:-104px;bottom:-92px}.intro:after{width:120px;height:120px;left:-68px;top:82px;border-color:rgba(239,109,91,.58)}
    .mark{position:relative;z-index:1;width:31px;height:31px;margin-bottom:84px;border-radius:8px;background:var(--teal);box-shadow:9px 9px 0 var(--coral)}
    .intro h1{position:relative;z-index:1;max-width:330px;margin:0;font-size:37px;line-height:1.22;letter-spacing:0}
    .intro p{position:relative;z-index:1;max-width:290px;margin:16px 0 0;color:#b8c9d5;font-size:14px;line-height:1.7}
    .intro small{position:absolute;z-index:1;left:48px;bottom:43px;color:#97a9b8;font-size:12px}
    .form{padding:56px 50px 42px}
    .form h2{margin:0;font-size:25px}.form .sub{margin:8px 0 28px;color:var(--muted);font-size:13px}
    label{display:block;margin:17px 0 7px;color:#344054;font-size:13px;font-weight:600}
    input{width:100%;height:44px;border:1px solid var(--line);border-radius:6px;padding:0 12px;background:#fff;color:var(--ink);font:inherit;outline:0;transition:border-color .16s ease,box-shadow .16s ease}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,155,131,.12)}
    button{width:100%;height:44px;margin-top:24px;border:0;border-radius:6px;background:var(--teal);color:#fff;font:600 14px inherit;cursor:pointer;transition:background .16s ease,transform .16s ease}
    button:hover{background:var(--teal-dark);transform:translateY(-1px)}button:disabled{background:#8fcec1;cursor:wait;transform:none}
    .msg{min-height:21px;margin-top:12px;color:#d92d20;font-size:12px;line-height:1.5}.tip{margin:19px 0 0;color:#98a2b3;font-size:12px;line-height:1.6}
    @media(max-width:650px){body{padding:16px}.shell{grid-template-columns:1fr}.intro{min-height:210px;padding:28px}.mark{margin-bottom:28px}.intro h1{font-size:26px}.intro p,.intro small{display:none}.form{padding:32px 26px}.intro:before{width:170px;height:170px;right:-85px;bottom:-100px}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro" aria-label="答疑中台">
      <div class="mark" aria-hidden="true"></div>
      <h1>让每一次答疑，都成为可复用的知识。</h1>
      <p>统一管理内容、审核流程和用户反馈，让运营决策有据可依。</p>
      <small>答疑知识库中台</small>
    </section>
    <section class="form" aria-labelledby="login-title">
      <h2 id="login-title">欢迎登录</h2>
      <p class="sub">使用后台账号进入知识运营工作台</p>
      <form id="login-form">
        <label for="username">账号</label>
        <input id="username" autocomplete="username" value="Weichizhuo" required>
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" value="123456" required>
        <button id="btn" type="submit">登录</button>
        <div id="msg" class="msg" role="alert" aria-live="polite"></div>
      </form>
      <p class="tip">登录后可管理知识内容、审核流程与账号权限。</p>
    </section>
  </main>
  <script src="lib/kb-runtime.js"></script>
  <script>
    var API = window.KB_RUNTIME.apiBase;
    var form = document.getElementById('login-form');
    var button = document.getElementById('btn');
    var message = document.getElementById('msg');

    function setMessage(text) {
      message.textContent = text || '';
    }

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      if (!username || !password) {
        setMessage('请输入账号和密码。');
        return;
      }
      button.disabled = true;
      setMessage('');
      fetch(API + '/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: username, password: password})
      })
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) throw new Error(data.detail || '登录失败，请检查账号或密码。');
            return data;
          });
        })
        .then(function(data) {
          localStorage.setItem('kb_token', data.token);
          localStorage.setItem('kb_user', JSON.stringify(data.user));
          window.location.assign(window.location.origin + '/app');
        })
        .catch(function(error) {
          button.disabled = false;
          setMessage(error.message);
        });
    });
  </script>
</body>
</html>
