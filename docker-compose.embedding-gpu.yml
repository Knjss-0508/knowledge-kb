services:
  backend:
    depends_on:
      embedding-qwen:
        condition: service_healthy

  embedding-qwen:
    # The default works with older CUDA drivers. Override TEI_GPU_IMAGE with
    # 120-1.9.1 on CUDA 12.9/Blackwell servers after preflight validation.
    image: ${TEI_GPU_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cuda-1.8.3}
    container_name: kb-embedding-qwen
    restart: unless-stopped
    gpus: all
    command:
      - --model-id
      - ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - --auto-truncate
    expose:
      - "80"
    volumes:
      - embedding_model_cache:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 10m

volumes:
  embedding_model_cache:
