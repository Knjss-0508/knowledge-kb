name: knowledge-kb

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowledge_admin} -d ${POSTGRES_DB:-knowledge_base}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: kb-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    expose:
      - "9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kb-backend
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
      ES_HOST: elasticsearch
      ES_PORT: 9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NMHT_BASE_URL: ${NMHT_BASE_URL:-https://nmht.zhuanspirit.com}
      NMHT_COOKIE: ${NMHT_COOKIE:-}
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding-qwen:80/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_HEALTHCHECK_URL: ${EMBEDDING_HEALTHCHECK_URL:-}
      DEDUP_BLOCK_THRESHOLD: ${DEDUP_BLOCK_THRESHOLD:-0.96}
      DEDUP_REVIEW_THRESHOLD: ${DEDUP_REVIEW_THRESHOLD:-0.88}
      DEDUP_MAX_CANDIDATES: ${DEDUP_MAX_CANDIDATES:-10}
      SEARCH_CHUNK_SIZE: ${SEARCH_CHUNK_SIZE:-800}
      SEARCH_CHUNK_OVERLAP: ${SEARCH_CHUNK_OVERLAP:-120}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-20971520}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kb-migrate
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  es_data:
  redis_data:
