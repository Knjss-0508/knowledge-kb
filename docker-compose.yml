name: knowledge-kb

services:
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kb-backend
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    environment:
      # Cloud/common base has no local database fallback. Deployment scripts
      # validate this value before Compose starts; local mode overrides it.
      DATABASE_URL: ${DATABASE_URL:-}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NMHT_BASE_URL: ${NMHT_BASE_URL:-https://nmht.zhuanspirit.com}
      NMHT_COOKIE: ${NMHT_COOKIE:-}
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding-qwen:80/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_HEALTHCHECK_URL: ${EMBEDDING_HEALTHCHECK_URL:-}
      DEDUP_BLOCK_THRESHOLD: ${DEDUP_BLOCK_THRESHOLD:-0.96}
      DEDUP_REVIEW_THRESHOLD: ${DEDUP_REVIEW_THRESHOLD:-0.88}
      DEDUP_MAX_CANDIDATES: ${DEDUP_MAX_CANDIDATES:-10}
      DEDUP_MIN_SEMANTIC_CONTENT_CHARS: ${DEDUP_MIN_SEMANTIC_CONTENT_CHARS:-8}
      DEDUP_MIN_CONTAINMENT_CONTENT_CHARS: ${DEDUP_MIN_CONTAINMENT_CONTENT_CHARS:-12}
      SEARCH_CHUNK_SIZE: ${SEARCH_CHUNK_SIZE:-800}
      SEARCH_CHUNK_OVERLAP: ${SEARCH_CHUNK_OVERLAP:-120}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-20971520}
      # Fail closed unless cloud config selects s3 or the local override selects local.
      MEDIA_STORAGE_BACKEND: ${MEDIA_STORAGE_BACKEND:-invalid}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN:-}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX:-knowledge-kb/media}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-auto}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PRESIGN_EXPIRES_SECONDS: ${S3_PRESIGN_EXPIRES_SECONDS:-900}
      MEDIA_UPLOAD_ACTIVE_TTL_SECONDS: ${MEDIA_UPLOAD_ACTIVE_TTL_SECONDS:-3600}
      MEDIA_UPLOAD_STAGING_TTL_SECONDS: ${MEDIA_UPLOAD_STAGING_TTL_SECONDS:-900}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kb-migrate
    command: ["python", "-m", "app.scripts.initialize_database"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-60}
      DB_CONNECT_RETRY_SECONDS: ${DB_CONNECT_RETRY_SECONDS:-2}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-10}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_FORCE_RESET: ${INITIAL_ADMIN_FORCE_RESET:-false}
      ALLOW_INSECURE_DEFAULT_ADMIN: ${ALLOW_INSECURE_DEFAULT_ADMIN:-false}

volumes:
  redis_data:
